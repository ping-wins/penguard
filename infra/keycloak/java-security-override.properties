# Re-enables legacy Kerberos / TLS algorithms for lab use only.
# Loaded with single '=' in -Djava.security.properties so values OVERRIDE the JDK defaults
# for the listed keys while leaving the rest of java.security intact.
jdk.tls.disabledAlgorithms=
jdk.certpath.disabledAlgorithms=
jdk.security.legacyAlgorithms=
crypto.policy=unlimited
