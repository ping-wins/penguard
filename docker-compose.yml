version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fortidashboard-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fortidashboard}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    image: node:20-alpine
    container_name: fortidashboard-web
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: >
      sh -c "corepack enable && pnpm install && cd apps/web && pnpm dev --host 0.0.0.0"

volumes:
  pgdata:
