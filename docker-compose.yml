services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      FORTIDASHBOARD_DATABASE_URL: ${FORTIDASHBOARD_DATABASE_URL:-postgresql+psycopg://fortidashboard:fortidashboard@db:5432/fortidashboard}
      FORTIDASHBOARD_SECRET_KEY: ${FORTIDASHBOARD_SECRET_KEY:-change-me-in-local-env}
      FORTIDASHBOARD_TOKEN_ENCRYPTION_KEY: ${FORTIDASHBOARD_TOKEN_ENCRYPTION_KEY:-}
      FORTIDASHBOARD_MOCK_MODE: ${FORTIDASHBOARD_MOCK_MODE:-false}
      FORTIDASHBOARD_SESSION_COOKIE_NAME: fortidashboard_session
      FORTIDASHBOARD_SESSION_COOKIE_SECURE: "false"
      FORTIDASHBOARD_SESSION_COOKIE_SAMESITE: lax
      FORTIDASHBOARD_SESSION_COOKIE_HTTPONLY: "true"
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAMESITE: lax
      SESSION_COOKIE_HTTPONLY: "true"
      FORTIDASHBOARD_CSRF_COOKIE_NAME: fortidashboard_csrf
      FORTIDASHBOARD_CSRF_HEADER_NAME: X-CSRF-Token
      FORTIDASHBOARD_AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${FORTIDASHBOARD_AUTH_RATE_LIMIT_MAX_ATTEMPTS:-10}
      FORTIDASHBOARD_AUTH_RATE_LIMIT_WINDOW_SECONDS: ${FORTIDASHBOARD_AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
      FORTIDASHBOARD_KEYCLOAK_BASE_URL: ${FORTIDASHBOARD_KEYCLOAK_BASE_URL:-http://fortidashboard.local:9080}
      FORTIDASHBOARD_KEYCLOAK_REALM: fortidashboard
      FORTIDASHBOARD_KEYCLOAK_CLIENT_ID: fortidashboard-bff
      FORTIDASHBOARD_KEYCLOAK_CLIENT_SECRET: ${FORTIDASHBOARD_KEYCLOAK_CLIENT_SECRET:-dev-client-secret}
      FORTIDASHBOARD_KEYCLOAK_VERIFY_SSL: ${FORTIDASHBOARD_KEYCLOAK_VERIFY_SSL:-false}
      FORTIDASHBOARD_OIDC_ISSUER: ${FORTIDASHBOARD_OIDC_ISSUER:-http://fortidashboard.local:9080/realms/fortidashboard}
      FORTIDASHBOARD_KEYCLOAK_BROWSER_BASE_URL: ${FORTIDASHBOARD_KEYCLOAK_BROWSER_BASE_URL:-http://fortidashboard.local:9080}
      FORTIDASHBOARD_SSO_REDIRECT_URI: ${FORTIDASHBOARD_SSO_REDIRECT_URI:-http://fortidashboard.local:8000/api/auth/sso/kerberos/callback}
      FORTIDASHBOARD_SSO_POST_LOGIN_URL: ${FORTIDASHBOARD_SSO_POST_LOGIN_URL:-http://fortidashboard.local:5173/}
      FORTIDASHBOARD_SIEM_KOWALSKI_URL: http://siem-kowalski:8000
      FORTIDASHBOARD_SOAR_SKIPPER_URL: http://soar-skipper:8000
      FORTIDASHBOARD_XDR_RICO_URL: http://xdr-rico:8000
    ports:
      - "${FORTIDASHBOARD_API_PORT:-8000}:8000"
    extra_hosts:
      - "fortidashboard.local:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    working_dir: /app
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - web_pnpm_store:/pnpm/store
    ports:
      - "${FORTIDASHBOARD_WEB_PORT:-5173}:5173"
    environment:
      CI: "true"
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      PNPM_STORE_DIR: /pnpm/store
      API_HOST: http://api:8000
      FRONTEND_URL: http://localhost:5173
    command: >
      sh -c "pnpm install --frozen-lockfile && pnpm --filter @fortidashboard/web dev --host 0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

  siem-kowalski:
    build:
      context: .
      dockerfile: apps/siem_kowalski/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      SIEM_KOWALSKI_DATABASE_URL: postgresql+psycopg://fortidashboard:fortidashboard@db:5432/fortidashboard
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  soar-skipper:
    build:
      context: .
      dockerfile: apps/soar_skipper/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  xdr-rico:
    build:
      context: .
      dockerfile: apps/xdr_rico/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      XDR_RICO_DATABASE_URL: postgresql+psycopg://fortidashboard:fortidashboard@db:5432/fortidashboard
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "${FORTIDASHBOARD_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fortidashboard}
      POSTGRES_USER: ${POSTGRES_USER:-fortidashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fortidashboard}
    ports:
      - "${FORTIDASHBOARD_POSTGRES_PORT:-5432}:5432"
    volumes:
      - fortidashboard_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortidashboard -d fortidashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: start-dev --import-realm --http-port=8080
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      FORTIDASHBOARD_KEYCLOAK_CLIENT_SECRET: ${FORTIDASHBOARD_KEYCLOAK_CLIENT_SECRET:-dev-client-secret}
      KRB5_CONFIG: /etc/krb5.conf
      JAVA_OPTS_APPEND: >-
        -Dsun.security.krb5.allowWeakCrypto=true
        -Djava.security.krb5.conf=/etc/krb5.conf
        -Djava.security.properties=/opt/keycloak/conf/java-security-override.properties
    ports:
      - "${FORTIDASHBOARD_KEYCLOAK_PORT:-8080}:8080"
    extra_hosts:
      - "fortidashboard.local:192.168.56.10"
      - "dc01.fortidashboard.local:192.168.56.10"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/realm-fortidashboard.json:/opt/keycloak/data/import/realm-fortidashboard.json:ro
      - ./fortidashboard.keytab:/opt/keycloak/conf/fortidashboard.keytab:ro
      - ./krb5.conf:/etc/krb5.conf:ro
      - ./infra/keycloak/java-security-override.properties:/opt/keycloak/conf/java-security-override.properties:ro

volumes:
  fortidashboard_db:
  keycloak_data:
  web_node_modules:
  web_app_node_modules:
  web_pnpm_store:
