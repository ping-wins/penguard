services:
  db:
    image: postgres:16-alpine
    container_name: fortidashboard-db
    environment:
      POSTGRES_DB: fortidashboard
      POSTGRES_USER: fortidashboard
      POSTGRES_PASSWORD: fortidashboard
    ports:
      - "5432:5432"
    volumes:
      - fortidashboard_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortidashboard -d fortidashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: fortidashboard-keycloak
    command: start-dev --import-realm --http-port=8080
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/realm-fortidashboard.json:/opt/keycloak/data/import/realm-fortidashboard.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  fortidashboard_db:
  keycloak_data:
