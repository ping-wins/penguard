name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"
      - "felipe/**"
      - "lucas/**"

permissions:
  contents: read

jobs:
  compose:
    name: Compose validation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose config --quiet

  api:
    name: API lint and tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest -q

  soc-lite:
    name: SOC-lite services
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - apps/siem_kowalski
          - apps/soar_skipper
          - apps/xdr_rico
          - apps/agent_private
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest -q

  web:
    name: Web tests and build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test -- --run
      - name: Build
        run: pnpm build
